scheme: Muse

menu:
  home: / || fa fa-home
  about: /resume/ || fa fa-user
  embedded: /embedded-solutions/ || fa fa-microchip
  geo: /geo-solutions/ || fa fa-globe
  rag: /rag-solutions/ || fa fa-database
  robotics: /robotics-solutions/ || fa fa-robot
  posts: /posts/ || fa fa-archive
  categories: /categories/ || fa fa-th
  tags: /tags/ || fa fa-tags

menu_settings:
  icons: true
  badges: false

custom_file_path:
  style: source/_data/styles.styl
  bodyEnd: source/_data/body-end.njk

sidebar:
  position: left
  display: post
  padding: 18
  offset: 12
  onmobile: false

avatar:
  url: /images/avatar.gif
  rounded: false
  rotated: false

favicon:
  small: /images/favicon-16x16-next.png
  medium: /images/favicon-32x32-next.png
  apple_touch_icon: /images/apple-touch-icon-next.png
  safari_pinned_tab: /images/logo.svg

vendors:
  anime: /lib/anime.min.js
  fontawesome: /lib/font-awesome/css/all.min.css

back2top:
  enable: true
  sidebar: false
  scrollpercent: false

bookmark:
  enable: false

copycode:
  enable: false

fancybox: false
mediumzoom: false
lazyload: false
pangu: false

local_search:
  enable: true

motion:
  enable: false

footer:
  since: 2023
