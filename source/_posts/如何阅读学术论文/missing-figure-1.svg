<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Missing original image</title>
  <desc id="desc">Placeholder for a screenshot that was originally hosted on a private LAN server.</desc>
  <rect width="800" height="450" fill="#f5f5f4"/>
  <rect x="24" y="24" width="752" height="402" rx="20" fill="#ffffff" stroke="#d6d3d1" stroke-width="2"/>
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#111827">Missing original image</text>
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6b7280">The original screenshot was hosted on a private LAN WordPress server.</text>
  <text x="400" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#6b7280">That resource is no longer reachable, so a local placeholder is used.</text>
</svg>
