title: 欢迎回来
subtitle: 享受生活 热爱游戏 记录学习
description: 记录我学习内容的网站
keywords:
  - blog
  - hexo
author: Nyquest
language: zh-CN
timezone: Asia/Shanghai

url: https://nyquest-unstable.github.io
root: /
permalink: :year/:month/:day/:title/
pretty_urls:
  trailing_index: false
  trailing_html: false

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true

syntax_highlighter: highlight.js
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false

prismjs:
  enable: false

index_generator:
  path: posts
  per_page: 10
  order_by: -date

per_page: 10
pagination_dir: page

theme: next

feed:
  type: atom
  path: atom.xml
  limit: 20

sitemap:
  path:
    - sitemap.xml
    - sitemap.txt

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html
